# my global config test
# deploy test
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093
          # - alertmanager:9093
  
# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  - /opt/prometheus/rules/alerts.yml
  - /opt/prometheus/rules/node_alerts.yml

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "prometheus"
    # metrics_path defaults to '/metrics'
    # scheme defaults to 'http'.

    static_configs:
      - targets: ["localhost:9090"]
       # The label name is added as a label `label_name=<label_value>` to any timeseries scraped from this config.
        labels:
          app: "prometheus"

  - job_name: 'node'
    file_sd_configs:
      - files:
          - /opt/prometheus/targets/node_exporters.yml
          
  - job_name: 'process'
    file_sd_configs:
      - files:
          - /opt/prometheus/targets/process_exporters.yml
        
  - job_name: 'proxmox'
    metrics_path: /pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']

    file_sd_configs:
      - files:
          - /opt/prometheus/targets/pve_exporters.yml

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: 192.168.10.50:9221
  
  - job_name: 'blackbox-http'
    metrics_path: /probe

    file_sd_configs:
      - files:
          - /opt/prometheus/targets/blackbox_http.yml

    relabel_configs:
      # pass target to blackbox
      - source_labels: [__address__]
        target_label: __param_target

      # pass module (http_2xx)
      - source_labels: [module]
        target_label: __param_module

      # ✅ ADD THIS (VERY IMPORTANT)
      - source_labels: [__param_target]
        target_label: target

      # ✅ ADD THIS (for Grafana filtering)
      - source_labels: [__param_target]
        target_label: instance

      # send to blackbox exporter
      - target_label: __address__
        replacement: 192.168.10.50:9115

  - job_name: 'snmp_exporter'
    metrics_path: /snmp

    file_sd_configs:
      - files:
         - targets/snmp_exporter.yml

    relabel_configs:
    # Target IP from file_sd
      - source_labels: [__address__]
        target_label: __param_target

    # Module from label
      - source_labels: [module]
        target_label: __param_module

    # Auth profile from label
      - source_labels: [auth]
        target_label: __param_auth

    # Device IP as instance label
      - source_labels: [__param_target]
        target_label: instance

    # Send request to SNMP Exporter
      - target_label: __address__
        replacement: 192.168.10.50:9116      

